services:
  tldraw:
    image: tldraw-selfhosted:licensed
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_TLDRAW_LICENSE_KEY: ${VITE_TLDRAW_LICENSE_KEY}
    restart: unless-stopped
    expose:
      - "5858"
    volumes:
      - tldraw_assets:/config/assets
      - tldraw_rooms:/config/rooms

volumes:
  tldraw_assets:
  tldraw_rooms:
